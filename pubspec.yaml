name: zunga
description: "Zunga — one app for every payment in Rwanda. Pure interface layer over the user's own USSD sessions; money never touches Zunga servers."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Local DB (AES-encrypted boxes)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Hardware-backed key storage (Android Keystore)
  flutter_secure_storage: ^9.2.2

  # Argon2id app-PIN hashing + Ed25519 config signature verification
  cryptography: ^2.7.0

  # Biometrics (BiometricPrompt)
  local_auth: ^2.3.0

  # Formatting (RWF amounts, dates, tabular numerals handled by theme)
  intl: any

  # WhatsApp support, Play rating, policy pages
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/configs/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
